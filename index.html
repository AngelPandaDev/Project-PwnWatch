<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PwnWatch | Milestone-2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 style="margin-bottom: 5px;">🔐 PwnWatch</h1>
    <p class="subtitle" style="color: gray; margin-bottom: 30px; display: block;">Search for known data breaches</p>
    <div class="controls">
        <input type="text" id="search-input" placeholder="Search breaches..." />
        <select id="sort-select">
            <option value="">Sort By</option>
            <option value="asc">Date Ascending</option>
            <option value="desc">Date Descending</option>
            <option value="alpha">Alphabetical</option>
        </select>
        <button id="theme-toggle">🌙 Toggle Theme</button>
    </div>
    <div class="main-layout" id="main-layout"></div>
    <script src="script.js"></script>
</body>

</html>
